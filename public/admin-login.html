<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logowanie — Panel Ekipy</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <svg width="22" height="16" viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg" style="border:1px solid var(--cb);border-radius:2px"><rect width="28" height="20" fill="#1a1200"/><rect width="28" height="7" fill="#c8a000"/><rect y="13" width="28" height="7" fill="#8a6e00"/><circle cx="14" cy="10" r="4" fill="#f5c800"/><circle cx="14" cy="10" r="2" fill="#fff8cc"/></svg>
      Panel <span>Ekipy</span>
    </div>
    <div style="font-family:'Cinzel',serif;font-size:1.1rem;color:var(--text-b);margin-bottom:1.3rem">Zaloguj się</div>
    <div id="alert"></div>
    <div class="form-group"><label class="form-label">Login</label><input type="text" id="username" class="form-control" placeholder="login"></div>
    <div class="form-group"><label class="form-label">Hasło</label><input type="password" id="password" class="form-control" placeholder="••••••••"></div>
    <button class="btn btn-gold" style="width:100%" onclick="doLogin()">Zaloguj się</button>
  </div>
</div>
<script>
  document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  async function doLogin(){
    const res=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:document.getElementById('username').value,password:document.getElementById('password').value})
    }).then(r=>r.json());
    if(res.success) location.href='/admin';
    else document.getElementById('alert').innerHTML=`<div class="alert alert-error">${res.error}</div>`;
  }
</script>
</body>
</html>
