<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admina — Patologiczne Expowisko</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .tab-bar{display:flex;gap:.3rem;margin-bottom:1.5rem;border-bottom:1px solid var(--border);}
    .tab-btn{padding:.5rem 1.2rem;font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--text-muted);transition:all .15s;border-bottom:2px solid transparent;}
    .tab-btn.active{color:var(--gold-light);border-bottom-color:var(--gold);}
    .tab-content{display:none;} .tab-content.active{display:block;}
    .filter-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem;}
    .actions{display:flex;gap:.4rem;flex-wrap:wrap;}
    .members-list div{padding:.1rem 0;font-size:.8rem;color:var(--text-muted);}
  </style>
</head>
<body>
<div class="chunjo-banner">
  <span class="chunjo-flag"><svg viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg"><rect width="28" height="20" fill="#1a1200"/><rect width="28" height="7" fill="#c8a000"/><rect y="13" width="28" height="7" fill="#8a6e00"/><circle cx="14" cy="10" r="4" fill="#f5c800"/><circle cx="14" cy="10" r="2" fill="#fff8cc"/></svg></span>
  <strong style="color:var(--gold-light);letter-spacing:.2em">CHUNJO</strong> — Patologiczne Expowisko
</div>
<nav>
  <a class="nav-logo" href="/">⚔️ Patologiczne <span>Expowisko</span></a>
  <div class="nav-links">
    <a href="/">Strona główna</a><a href="/calendar">Kalendarz</a>
    <a href="/dashboard">Moje rez.</a><a href="/admin" class="active">Admin</a>
    <span id="navUser" style="color:var(--gold-light);font-family:'Cinzel',serif;font-size:.8rem"></span>
    <form action="/logout" method="post"><button class="btn btn-outline btn-sm">Wyloguj</button></form>
  </div>
</nav>
<main>
<div class="page-wrap" style="max-width:1100px">
  <h1 class="page-title" style="margin-bottom:1.5rem">Panel <span>Administratora</span></h1>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('bookings',this)">📋 Rezerwacje</button>
    <button class="tab-btn" onclick="showTab('stats',this)">📊 Statystyki</button>
    <button class="tab-btn" onclick="showTab('coupons',this)">🏷️ Kupony</button>
    <button class="tab-btn" onclick="showTab('chat',this)">💬 Czaty</button>
  </div>

  <!-- BOOKINGS TAB -->
  <div id="tab-bookings" class="tab-content active">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterStatus('all',this)">Wszystkie</button>
      <button class="filter-btn" onclick="filterStatus('pending',this)">Oczekujące</button>
      <button class="filter-btn" onclick="filterStatus('active',this)">W toku</button>
      <button class="filter-btn" onclick="filterStatus('done',this)">Ukończone</button>
      <button class="filter-btn" onclick="filterStatus('rejected',this)">Odrzucone</button>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Pakiet</th><th>Termin</th><th>Gracze</th><th>Status</th><th>Akcje</th></tr></thead>
          <tbody id="tbody"><tr><td colspan="6"><div class="spinner"></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- STATS TAB -->
  <div id="tab-stats" class="tab-content">
    <div id="statsContent"><div class="spinner"></div></div>
  </div>

  <!-- COUPONS TAB -->
  <div id="tab-coupons" class="tab-content">
    <div class="card" style="margin-bottom:1.5rem">
      <div style="font-family:'Cinzel',serif;font-size:1rem;color:var(--text-bright);margin-bottom:1rem">Nowy kupon</div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Kod kuponu *</label><input type="text" id="newCouponCode" class="form-control" placeholder="PROMO20" style="text-transform:uppercase"></div>
        <div class="form-group"><label class="form-label">Rabat % *</label><input type="number" id="newCouponDiscount" class="form-control" min="1" max="100" placeholder="20"></div>
        <div class="form-group"><label class="form-label">Maks. użyć</label><input type="number" id="newCouponMaxUses" class="form-control" min="1" value="1"></div>
        <div class="form-group"><label class="form-label">Wygasa (opcjonalne)</label><input type="date" id="newCouponExpires" class="form-control"></div>
      </div>
      <button class="btn btn-gold" onclick="createCoupon()">+ Utwórz kupon</button>
      <div id="couponAlert" style="margin-top:.8rem"></div>
    </div>
    <div class="card">
      <div style="font-family:'Cinzel',serif;font-size:1rem;color:var(--text-bright);margin-bottom:1rem">Aktywne kupony</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Kod</th><th>Rabat</th><th>Użycia</th><th>Wygasa</th><th>Akcje</th></tr></thead>
          <tbody id="couponsBody"><tr><td colspan="5" style="color:var(--text-muted);text-align:center">Ładowanie...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- CHAT TAB -->
  <div id="tab-chat" class="tab-content">
    <div id="chatAdminContent"><div class="spinner"></div></div>
    <div id="chatAdminBox" style="display:none;margin-top:1rem">
      <div style="font-family:'Cinzel',serif;font-size:.9rem;color:var(--gold-light);margin-bottom:.8rem" id="chatAdminTitle"></div>
      <div class="chat-box">
        <div class="chat-messages" id="adminChatMessages"></div>
      </div>
      <div class="chat-input-row">
        <input type="text" id="adminChatInput" class="chat-input" placeholder="Odpowiedz klientowi..." onkeydown="if(event.key==='Enter')sendAdminMsg()">
        <button class="btn btn-gold btn-sm" onclick="sendAdminMsg()">Wyślij</button>
      </div>
    </div>
  </div>
</div>
</main>

<footer><p>⚔️ <strong style="color:var(--gold-light)">Patologiczne Expowisko</strong> — Panel Administratora</p></footer>
<script src="/js/nav.js"></script>
<script>
let allBookings=[], currentFilter='all', adminChatBookingId=null, adminChatWs=null, myUserId=null;

initNav('/admin').then(data=>{
  if(!data.loggedIn||data.role!=='admin'){location.href='/';return;}
  myUserId=data.userId;
  loadBookings();
});

function showTab(tab, btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
  if(tab==='stats') loadStats();
  if(tab==='coupons') loadCoupons();
  if(tab==='chat') loadAdminChats();
}

// BOOKINGS
async function loadBookings(){
  allBookings=await fetch('/api/admin/bookings').then(r=>r.json());
  renderTable();
}

function renderTable(){
  const filtered=currentFilter==='all'?allBookings:allBookings.filter(b=>b.status===currentFilter);
  const tbody=document.getElementById('tbody');
  if(!filtered.length){tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:2rem">Brak rezerwacji.</td></tr>`;return;}
  tbody.innerHTML=filtered.map(b=>`
    <tr>
      <td style="color:var(--text-muted)">#${b.id}</td>
      <td>
        <div style="color:var(--text-bright)">${PARTY_ICONS[b.party_size]||''} ${b.service_name}</div>
        <div style="font-size:.75rem;color:var(--text-muted)">${b.members.length}/${b.party_size} graczy · ${b.price_sm?.toLocaleString()} SM/h</div>
      </td>
      <td><div>${b.booked_date}</div><div style="color:var(--text-muted);font-size:.85rem">${b.booked_time}</div></td>
      <td><div class="members-list">${b.members.map(m=>`<div>⚔️ <strong style="color:var(--text-bright)">${m.username}</strong> — ${m.char_name} (${m.char_class} poz.${m.char_level}→${m.target_level})${m.contact_discord?' 💬 '+m.contact_discord:''}</div>`).join('')||'<div style="font-style:italic">Brak graczy</div>'}</div></td>
      <td><span class="badge ${STATUS_BADGES[b.status]}">${STATUS_LABELS[b.status]}</span></td>
      <td>
        <div class="actions">
          ${b.status==='pending'?`<button class="btn btn-sm" style="background:#003020;color:#40d090;border:1px solid #006040" onclick="updateStatus(${b.id},'active')">Przyjmij</button><button class="btn btn-sm btn-danger" onclick="updateStatus(${b.id},'rejected')">Odrzuć</button>`:''}
          ${b.status==='active'?`<button class="btn btn-sm" style="background:#001530;color:#4080f0;border:1px solid #003080" onclick="updateStatus(${b.id},'done')">Ukończ</button>`:''}
          <button class="btn btn-sm btn-outline" onclick="openAdminChat(${b.id},'${b.service_name}')">💬</button>
          <button class="btn btn-sm btn-danger" onclick="deleteBooking(${b.id})" title="Usuń">🗑️</button>
        </div>
      </td>
    </tr>`).join('');
}

function filterStatus(status,btn){
  currentFilter=status;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

async function updateStatus(id,status){
  await fetch(`/api/admin/bookings/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});
  loadBookings();
}

async function deleteBooking(id){
  if(!confirm('Czy na pewno chcesz usunąć tę rezerwację? Tej akcji nie można cofnąć.')) return;
  await fetch(`/api/admin/bookings/${id}`,{method:'DELETE'});
  loadBookings();
}

// STATS
async function loadStats(){
  const s=await fetch('/api/admin/stats').then(r=>r.json());
  const maxCount=Math.max(...s.byMonth.map(m=>m.count),1);
  document.getElementById('statsContent').innerHTML=`
    <div class="grid-4" style="margin-bottom:1.5rem">
      <div class="stat-card"><div class="stat-card-value">${s.totalBookings}</div><div class="stat-card-label">Wszystkich rezerwacji</div></div>
      <div class="stat-card"><div class="stat-card-value">${s.doneBookings}</div><div class="stat-card-label">Ukończonych</div></div>
      <div class="stat-card"><div class="stat-card-value">${s.pendingBookings}</div><div class="stat-card-label">Oczekujących</div></div>
      <div class="stat-card"><div class="stat-card-value">${s.totalUsers}</div><div class="stat-card-label">Użytkowników</div></div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div style="font-family:'Cinzel',serif;font-size:.85rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem">Rezerwacje wg pakietu</div>
        ${s.byService.map(sv=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border)">
            <span style="color:var(--text)">${sv.name}</span>
            <span style="color:var(--gold-light);font-family:'Cinzel',serif">${sv.count} rez.</span>
          </div>`).join('')}
      </div>
      <div class="card">
        <div style="font-family:'Cinzel',serif;font-size:.85rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.5rem">Rezerwacje wg miesiąca</div>
        <div class="bar-chart">
          ${s.byMonth.map(m=>`
            <div class="bar-col">
              <div class="bar" style="height:${Math.round((m.count/maxCount)*100)}px" title="${m.count}"></div>
              <div class="bar-label">${m.month?.slice(5)||''}<br>${m.count}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>
    <div class="card" style="margin-top:1.5rem;text-align:center">
      <div style="font-family:'Cinzel',serif;font-size:.85rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.5rem">Średnia ocena graczy</div>
      <div style="font-size:2.5rem;color:var(--gold-light);font-family:'Cinzel',serif;font-weight:900">${s.avgRating > 0 ? s.avgRating + ' ⭐' : 'Brak ocen'}</div>
      <div style="color:var(--text-muted);font-size:.85rem">na podstawie ${s.totalReviews} opinii</div>
    </div>
  `;
}

// COUPONS
async function loadCoupons(){
  const coupons=await fetch('/api/admin/coupons').then(r=>r.json());
  document.getElementById('couponsBody').innerHTML=coupons.length?coupons.map(c=>`
    <tr>
      <td><strong style="color:var(--gold-light);font-family:'Cinzel',serif">${c.code}</strong></td>
      <td>${c.discount_percent}%</td>
      <td>${c.uses}/${c.max_uses}</td>
      <td>${c.expires_at||'Bez limitu'}</td>
      <td><button class="btn btn-danger btn-xs" onclick="deleteCoupon(${c.id})">Usuń</button></td>
    </tr>`).join(''):`<tr><td colspan="5" style="color:var(--text-muted);text-align:center;padding:1rem">Brak kuponów.</td></tr>`;
}

async function createCoupon(){
  const code=document.getElementById('newCouponCode').value.trim();
  const discount=document.getElementById('newCouponDiscount').value;
  const maxUses=document.getElementById('newCouponMaxUses').value;
  const expires=document.getElementById('newCouponExpires').value;
  const res=await fetch('/api/admin/coupons',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({code,discount_percent:discount,max_uses:maxUses,expires_at:expires||null})
  }).then(r=>r.json());
  const al=document.getElementById('couponAlert');
  if(res.success){al.innerHTML='<div class="alert alert-success">Kupon utworzony!</div>';loadCoupons();}
  else al.innerHTML=`<div class="alert alert-error">${res.error}</div>`;
}

async function deleteCoupon(id){
  await fetch('/api/admin/coupons/'+id,{method:'DELETE'});
  loadCoupons();
}

// ADMIN CHAT
async function loadAdminChats(){
  const bookings=await fetch('/api/admin/bookings').then(r=>r.json());
  const el=document.getElementById('chatAdminContent');
  if(!bookings.length){el.innerHTML='<p style="color:var(--text-muted)">Brak rezerwacji.</p>';return;}
  el.innerHTML=`<div class="grid-2">${bookings.filter(b=>b.status!=='deleted').map(b=>`
    <div class="card" style="cursor:pointer" onclick="openAdminChat(${b.id},'${b.service_name}')">
      <div style="font-family:'Cinzel',serif;font-size:.9rem;color:var(--text-bright);margin-bottom:.3rem">${PARTY_ICONS[b.party_size]||''} ${b.service_name} #${b.id}</div>
      <div style="color:var(--text-muted);font-size:.8rem">${b.booked_date} o ${b.booked_time}</div>
      <div style="color:var(--text-muted);font-size:.75rem;margin-top:.3rem">${b.members.map(m=>m.username).join(', ')}</div>
      <div style="margin-top:.8rem"><button class="btn btn-outline btn-sm">💬 Otwórz czat</button></div>
    </div>`).join('')}</div>`;
}

async function openAdminChat(bookingId, name){
  adminChatBookingId=bookingId;
  document.getElementById('chatAdminTitle').textContent='💬 Czat z graczami — '+name+' #'+bookingId;
  document.getElementById('adminChatMessages').innerHTML='';
  document.getElementById('chatAdminBox').style.display='';

  // Switch to chat tab if not there
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-chat').classList.add('active');
  document.querySelectorAll('.tab-btn')[3].classList.add('active');

  const msgs=await fetch('/api/chat/'+bookingId).then(r=>r.json()).catch(()=>[]);
  msgs.forEach(m=>appendAdminMsg(m));

  if(adminChatWs) adminChatWs.close();
  const proto=location.protocol==='https:'?'wss':'ws';
  adminChatWs=new WebSocket(proto+'://'+location.host);
  adminChatWs.onopen=()=>adminChatWs.send(JSON.stringify({type:'join',bookingId,username:'Admin',isAdmin:true}));
  adminChatWs.onmessage=e=>{ const d=JSON.parse(e.data); if(d.type==='message'&&d.data.booking_id==bookingId) appendAdminMsg(d.data); };
}

function appendAdminMsg(m){
  const el=document.getElementById('adminChatMessages');
  const isMine=m.user_id===myUserId;
  const isAdmin=m.is_admin;
  const cls=isMine?'mine':isAdmin?'admin':'other';
  const time=new Date(m.created_at).toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
  const div=document.createElement('div');
  div.className='chat-msg '+cls;
  div.innerHTML=`<div>${m.message}</div><div class="chat-msg-meta">${isAdmin?'🛡️ Ekipa':'👤 '+m.username} · ${time}</div>`;
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
}

async function sendAdminMsg(){
  const input=document.getElementById('adminChatInput');
  const msg=input.value.trim();
  if(!msg||!adminChatBookingId) return;
  input.value='';
  await fetch('/api/chat/'+adminChatBookingId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
}
</script>
</body>
</html>
