<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logowanie — Projekt Hard</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
    .auth-box{width:100%;max-width:420px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem;animation:fadeUp .5s ease;}
    .auth-logo{text-align:center;font-family:'Cinzel',serif;font-size:1.5rem;font-weight:900;color:var(--gold-light);margin-bottom:2rem;}
    .auth-logo span{color:var(--red);}
    .auth-title{font-family:'Cinzel',serif;font-size:1.2rem;color:var(--text-bright);margin-bottom:1.5rem;}
    .auth-footer{text-align:center;margin-top:1.5rem;color:var(--text-muted);font-size:.9rem;}
    .auth-footer a{color:var(--gold);text-decoration:none;}
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">⚔️ Projekt <span>Hard</span></div>
    <div class="auth-title">Zaloguj się</div>
    <div id="alert"></div>
    <div class="form-group">
      <label class="form-label">Nazwa użytkownika</label>
      <input type="text" id="username" class="form-control" placeholder="TwojaPostać">
    </div>
    <div class="form-group">
      <label class="form-label">Hasło</label>
      <input type="password" id="password" class="form-control" placeholder="••••••••">
    </div>
    <button class="btn btn-gold" style="width:100%" id="loginBtn" onclick="doLogin()">Zaloguj się</button>
    <div class="auth-footer">Nie masz konta? <a href="/register">Zarejestruj się</a></div>
  </div>
</div>
<script>
  const params=new URLSearchParams(location.search);
  const redirect=params.get('redirect')||'/';
  document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  async function doLogin(){
    const btn=document.getElementById('loginBtn');
    btn.disabled=true;btn.textContent='Logowanie...';
    const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:document.getElementById('username').value,password:document.getElementById('password').value,redirect})
    }).then(r=>r.json());
    if(res.success){location.href=res.redirect;}
    else{document.getElementById('alert').innerHTML=`<div class="alert alert-error">${res.errors.join('<br>')}</div>`;btn.disabled=false;btn.textContent='Zaloguj się';}
  }
</script>
</body>
</html>
