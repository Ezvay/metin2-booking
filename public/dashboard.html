<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moje rezerwacje — Patologiczne Expowisko</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .page-wrap{max-width:900px;margin:0 auto;padding:3rem 1.5rem;}
    .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
    .page-title{font-family:'Cinzel',serif;font-size:1.8rem;font-weight:900;color:var(--text-bright);}
    .page-title span{color:var(--red-light);}
    .empty-state{text-align:center;padding:4rem 1rem;color:var(--text-muted);}
    .booking-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;position:relative;overflow:hidden;}
    .booking-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);opacity:.4;}
    .booking-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem;}
    .booking-service{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--text-bright);}
    .booking-meta{display:flex;gap:1.5rem;flex-wrap:wrap;color:var(--text-muted);font-size:.9rem;}
  </style>
</head>
<body>
<div class="chunjo-banner">
  <strong style="color:#ff2222;letter-spacing:.2em">CHUNJO</strong> — Patologiczne Expowisko
</div>
<nav>
  <a class="nav-logo" href="/">⚔️ Patologiczne <span>Expowisko</span></a>
  <div class="nav-links">
    <a href="/">Strona główna</a>
    <a href="/book">Rezerwuj</a>
    <a href="/dashboard" class="active">Moje rezerwacje</a>
    <a href="/admin" id="navAdmin" style="display:none">Panel admina</a>
    <span id="navUser" style="color:var(--red-light);font-family:'Cinzel',serif;font-size:.8rem"></span>
    <form action="/logout" method="post" id="logoutForm">
      <button class="btn btn-outline btn-sm">Wyloguj</button>
    </form>
  </div>
</nav>
<main>
<div class="page-wrap">
  <div class="page-header">
    <h1 class="page-title">Moje <span>Rezerwacje</span></h1>
    <a href="/book" class="btn btn-gold btn-sm">+ Nowa rezerwacja</a>
  </div>
  <div id="content"><div class="spinner"></div></div>
</div>
</main>
<footer><p>⚔️ <strong style="color:var(--red-light)">Patologiczne Expowisko</strong> — Metin2 Leveling dla Chunjo</p></footer>
<script>
  const statusLabel={pending:'Oczekuje',active:'W toku',done:'Ukończone',rejected:'Odrzucone'};
  const statusBadge={pending:'badge-pending',active:'badge-active',done:'badge-done',rejected:'badge-rejected'};
  fetch('/api/session').then(r=>r.json()).then(data=>{
    if(!data.loggedIn){location.href='/login?redirect=/dashboard';return;}
    document.getElementById('navUser').textContent='👤 '+data.username;
    if(data.role==='admin') document.getElementById('navAdmin').style.display='';
    loadBookings();
  });
  async function loadBookings(){
    const bookings=await fetch('/api/my-bookings').then(r=>r.json());
    const el=document.getElementById('content');
    if(!bookings.length){
      el.innerHTML=`<div class="empty-state"><p style="font-size:3rem;margin-bottom:1rem">📭</p><p>Nie masz jeszcze żadnych rezerwacji.</p><a href="/book" class="btn btn-gold" style="margin-top:1.5rem">⚔️ Zarezerwuj expienie</a></div>`;
      return;
    }
    el.innerHTML=bookings.map(b=>`
      <div class="booking-card fade-up">
        <div class="booking-header">
          <div>
            <div class="booking-service">${b.service_name}</div>
            <div style="color:var(--text-muted);font-size:.85rem;margin-top:.2rem">Złożono: ${new Date(b.created_at).toLocaleDateString('pl-PL')}</div>
          </div>
          <span class="badge ${statusBadge[b.status]||'badge-pending'}">${statusLabel[b.status]||b.status}</span>
        </div>
        <div class="booking-meta">
          <span>⚔️ ${b.char_name} (${b.char_class})</span>
          <span>📈 Poz. ${b.char_level} → ${b.target_level}</span>
          <span>📅 ${b.booked_date} o ${b.booked_time}</span>
          <span>💰 ${b.price_gold?.toLocaleString()} SM/h</span>
          ${b.contact_discord?`<span>💬 ${b.contact_discord}</span>`:''}
        </div>
        ${b.note?`<div style="margin-top:.8rem;padding:.6rem .8rem;background:#0a0e1a;border-radius:4px;color:var(--text-muted);font-size:.9rem">📝 ${b.note}</div>`:''}
      </div>`).join('');
  }
</script>
</body>
</html>
