<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moje rezerwacje — Patologiczne Expowisko</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .booking-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;position:relative;overflow:hidden;}
    .booking-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4;}
    .booking-actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);}
  </style>
</head>
<body>
<div class="chunjo-banner">
  <span class="chunjo-flag"><svg viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg"><rect width="28" height="20" fill="#1a1200"/><rect width="28" height="7" fill="#c8a000"/><rect y="13" width="28" height="7" fill="#8a6e00"/><circle cx="14" cy="10" r="4" fill="#f5c800"/><circle cx="14" cy="10" r="2" fill="#fff8cc"/></svg></span>
  <strong style="color:var(--gold-light);letter-spacing:.2em">CHUNJO</strong> — Patologiczne Expowisko
</div>
<nav>
  <a class="nav-logo" href="/">⚔️ Patologiczne <span>Expowisko</span></a>
  <div class="nav-links">
    <a href="/">Strona główna</a>
    <a href="/slots">📅 Dostępne terminy</a>
    <a href="/dashboard" class="active">Moje rezerwacje</a>
    <a href="/admin" id="navAdmin" style="display:none">Admin</a>
    <span id="navUser" style="color:var(--gold-light);font-family:'Cinzel',serif;font-size:.8rem"></span>
    <form action="/logout" method="post" id="logoutForm"><button class="btn btn-outline btn-sm">Wyloguj</button></form>
  </div>
</nav>
<main>
<div class="page-wrap">
  <div class="page-header">
    <h1 class="page-title">Moje <span>Rezerwacje</span></h1>
    <a href="/slots" class="btn btn-gold btn-sm">+ Zarezerwuj termin</a>
  </div>
  <div id="content"><div class="spinner"></div></div>
</div>
</main>

<!-- REVIEW MODAL -->
<div class="modal-overlay" id="reviewModal">
  <div class="modal">
    <button class="modal-close" onclick="closeReview()">✕</button>
    <div class="modal-title">⭐ Oceń expienie</div>
    <div id="reviewAlert"></div>
    <div class="form-group">
      <label class="form-label">Ocena *</label>
      <div class="stars" id="stars">
        <span class="star" onclick="setRating(1)" style="opacity:.3">⭐</span>
        <span class="star" onclick="setRating(2)" style="opacity:.3">⭐</span>
        <span class="star" onclick="setRating(3)" style="opacity:.3">⭐</span>
        <span class="star" onclick="setRating(4)" style="opacity:.3">⭐</span>
        <span class="star" onclick="setRating(5)" style="opacity:.3">⭐</span>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Komentarz (opcjonalne)</label><textarea id="reviewComment" class="form-control" rows="3" placeholder="Powiedz jak było..."></textarea></div>
    <button class="btn btn-gold" style="width:100%" onclick="submitReview()">Wyślij opinię</button>
  </div>
</div>

<!-- CHAT MODAL -->
<div class="modal-overlay" id="chatModal">
  <div class="modal" style="max-width:540px">
    <button class="modal-close" onclick="closeChat()">✕</button>
    <div class="modal-title" id="chatTitle">💬 Czat z ekipą</div>
    <div class="chat-box">
      <div class="chat-messages" id="chatMessages"></div>
    </div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" class="chat-input" placeholder="Napisz wiadomość..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="btn btn-gold btn-sm" onclick="sendMsg()">Wyślij</button>
    </div>
  </div>
</div>

<footer><p>⚔️ <strong style="color:var(--gold-light)">Patologiczne Expowisko</strong></p></footer>
<script src="/js/nav.js"></script>
<script>
let myUserId=null, reviewBookingId=null, currentRating=0, chatBookingId=null, chatWs=null;

initNav().then(data=>{
  if(!data.loggedIn){location.href='/login?redirect=/dashboard';return;}
  myUserId=data.userId;
  loadBookings();
});

async function loadBookings(){
  const bookings=await fetch('/api/my-bookings').then(r=>r.json());
  const el=document.getElementById('content');
  if(!bookings.length){
    el.innerHTML=`<div style="text-align:center;padding:4rem;color:var(--text-muted)">
      <p style="font-size:3rem;margin-bottom:1rem">📭</p>
      <p>Nie masz jeszcze żadnych rezerwacji.</p>
      <a href="/slots" class="btn btn-gold" style="margin-top:1.5rem">📅 Zobacz dostępne terminy</a>
    </div>`;
    return;
  }
  el.innerHTML=bookings.map(b=>{
    const icon=PKG_ICONS[b.package_type]||'⚔️';
    const partyHtml=b.slot_bookings.map(m=>`
      <span style="background:#0a0e1a;border:1px solid var(--border);border-radius:4px;padding:.15rem .5rem;font-size:.8rem;color:var(--text)">
        ⚔️ ${m.char_name} (${m.char_class} poz.${m.char_level})
      </span>`).join('');
    const canCancel=b.status==='pending';
    const canReview=b.status==='done'&&!b.reviewed;
    const statusUrl='/status?token='+b.status_token;

    return `<div class="booking-card fade-up">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem">
        <div>
          <div style="font-family:'Cinzel',serif;font-size:1.1rem;color:var(--text-bright)">${icon} ${b.package_name}</div>
          <div style="color:var(--text-muted);font-size:.85rem;margin-top:.2rem">📅 ${b.date} o ${b.time}</div>
        </div>
        <span class="badge ${STATUS_BADGES[b.status]||'badge-pending'}">${STATUS_LABELS[b.status]||b.status}</span>
      </div>
      <div style="display:flex;gap:1.2rem;flex-wrap:wrap;color:var(--text-muted);font-size:.9rem;margin-bottom:.8rem">
        <span>⚔️ ${b.char_name} (${b.char_class})</span>
        <span>📈 Poz. ${b.char_level}</span>
        <span>💰 ${b.price_sm?.toLocaleString()} SM/h</span>
        <span>💬 ${b.contact_discord}</span>
      </div>
      ${b.max_players>1&&b.slot_bookings.length>0?`<div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.5rem">${partyHtml}</div>`:''}
      ${b.slot_note?`<div style="padding:.4rem .7rem;background:#0a0e1a;border-radius:4px;color:var(--text-muted);font-size:.85rem;margin-bottom:.5rem">📝 ${b.slot_note}</div>`:''}
      <div class="booking-actions">
        <button class="btn btn-outline btn-sm" onclick="openChat(${b.id},'${b.package_name}')">💬 Czat z ekipą</button>
        <a href="${statusUrl}" target="_blank" class="btn btn-outline btn-sm">🔗 Status</a>
        ${canReview?`<button class="btn btn-success btn-sm" onclick="openReview(${b.id})">⭐ Oceń</button>`:''}
        ${b.status==='done'&&b.reviewed?`<span class="badge badge-done">✓ Oceniono</span>`:''}
        ${canCancel?`<button class="btn btn-danger btn-sm" onclick="cancelBooking(${b.id})">✕ Anuluj</button>`:''}
      </div>
    </div>`;
  }).join('');
}

async function cancelBooking(id){
  if(!confirm('Czy na pewno chcesz anulować tę rezerwację?')) return;
  const res=await fetch(`/api/bookings/${id}/cancel`,{method:'POST'}).then(r=>r.json());
  if(res.success) loadBookings();
  else alert(res.error);
}

// REVIEW
let reviewBookId=null;
function openReview(id){ reviewBookId=id; currentRating=0; updateStars(); document.getElementById('reviewComment').value=''; document.getElementById('reviewAlert').innerHTML=''; document.getElementById('reviewModal').classList.add('open'); }
function closeReview(){ document.getElementById('reviewModal').classList.remove('open'); }
function setRating(r){ currentRating=r; updateStars(); }
function updateStars(){ document.querySelectorAll('.star').forEach((s,i)=>s.style.opacity=i<currentRating?'1':'.3'); }
async function submitReview(){
  if(!currentRating){ document.getElementById('reviewAlert').innerHTML='<div class="alert alert-error">Wybierz ocenę.</div>'; return; }
  const res=await fetch('/api/reviews',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({booking_id:reviewBookId,rating:currentRating,comment:document.getElementById('reviewComment').value})
  }).then(r=>r.json());
  if(res.success){ closeReview(); loadBookings(); }
  else document.getElementById('reviewAlert').innerHTML=`<div class="alert alert-error">${res.error}</div>`;
}

// CHAT
async function openChat(bookingId, name){
  chatBookingId=bookingId;
  document.getElementById('chatTitle').textContent='💬 Czat — '+name+' #'+bookingId;
  document.getElementById('chatMessages').innerHTML='';
  document.getElementById('chatModal').classList.add('open');
  const msgs=await fetch('/api/chat/'+bookingId).then(r=>r.json()).catch(()=>[]);
  msgs.forEach(appendMsg);
  if(chatWs) chatWs.close();
  const proto=location.protocol==='https:'?'wss':'ws';
  chatWs=new WebSocket(proto+'://'+location.host);
  chatWs.onopen=()=>chatWs.send(JSON.stringify({type:'join',bookingId,username:'gracz'}));
  chatWs.onmessage=e=>{ const d=JSON.parse(e.data); if(d.type==='message'&&String(d.data.booking_id)===String(bookingId)) appendMsg(d.data); };
}
function closeChat(){ document.getElementById('chatModal').classList.remove('open'); if(chatWs){chatWs.close();chatWs=null;} }
function appendMsg(m){
  const el=document.getElementById('chatMessages');
  const isMine=m.user_id===myUserId;
  const cls=isMine?'mine':m.is_admin?'admin':'other';
  const time=new Date(m.created_at).toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
  const div=document.createElement('div');
  div.className='chat-msg '+cls;
  div.innerHTML=`<div>${m.message}</div><div class="chat-msg-meta">${m.is_admin?'🛡️ Ekipa':'👤 '+m.username} · ${time}</div>`;
  el.appendChild(div); el.scrollTop=el.scrollHeight;
}
async function sendMsg(){
  const input=document.getElementById('chatInput');
  const msg=input.value.trim();
  if(!msg||!chatBookingId) return;
  input.value='';
  await fetch('/api/chat/'+chatBookingId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
}

document.getElementById('reviewModal').addEventListener('click',e=>{if(e.target===document.getElementById('reviewModal'))closeReview();});
document.getElementById('chatModal').addEventListener('click',e=>{if(e.target===document.getElementById('chatModal'))closeChat();});
</script>
</body>
</html>
